{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="shortcut icon" href="{% static 'musicunkno.png' %}" type="image/x-icon">
<title>{{ music.music_name }} - Music Lobby</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
}

body {
    background: #000;
    color: #fff;
    min-height: 100vh;
    padding: 40px 20px;
    direction: rtl;
    display: flex;
    flex-direction: column;
}

.header {
    width: 100%;
    max-width: 1000px;
    margin: 0 auto 60px auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-direction: row-reverse;
}

.back-link {
    text-decoration: none;
    color: black;
    font-size: 14px;
    font-weight: 500;
    background: white;
    padding: 10px 16px;
    border-radius: 10px;
    transition: .2s;
}

.back-link:hover {
    transform: translateY(-2px);
}

.logo {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    object-fit: cover;
}

/* --- Player Section (Centered) --- */
.player-section {
    width: 100%;
    max-width: 500px;
    margin: 0 auto;
    background: #111;
    border-radius: 18px;
    padding: 40px;
    box-shadow: 0 10px 30px rgba(0,0,0,.6);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
}

.cover-art {
    width: 180px;
    height: 180px;
    background: #1c1c1e;
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 70px;
    margin-bottom: 25px;
    box-shadow: 0 10px 20px rgba(0,0,0,.4);
}

.main-song-name {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 8px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
    padding: 0 15px;
}

.main-uploader {
    font-size: 14px;
    color: #888;
    margin-bottom: 30px;
}

/* --- Custom Audio Controls --- */
.custom-player {
    width: 100%;
}

.controls {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 25px;
}

.play-pause-btn {
    background: #fff;
    color: #000;
    width: 65px;
    height: 65px;
    border-radius: 50%;
    font-size: 26px;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.2s;
}

.play-pause-btn:hover {
    background: #ddd;
    transform: scale(1.05);
}

.progress-container {
    display: flex;
    align-items: center;
    gap: 15px;
    font-size: 12px;
    color: #888;
    width: 100%;
    direction: ltr;
}

.progress-bar {
    flex: 1;
    height: 6px;
    background: #333;
    border-radius: 3px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
}

.progress-fill {
    height: 100%;
    background: #fff;
    width: 0%;
    transition: width 0.1s linear;
}

/* --- Share Button --- */
.share-btn {
    padding: 10px 20px;
    background: rgba(255,255,255,.1);
    color: #fff;
    border: none;
    border-radius: 14px;
    font-size: 13px;
    cursor: pointer;
    transition: .2s;
    margin-top: 30px;
}

.share-btn:hover {
    background: #fff;
    color: #000;
}

</style>
</head>

<body>

<div class="header">
    <a href="/" class="back-link">بازگشت</a>
    <img src="{% static 'musicunkno.png' %}" class="logo" alt="logo">
</div>

<div class="player-section">
    <div class="cover-art">🎵</div>
    <div class="main-song-name">{{ music.music_name }}</div>
    <div class="main-uploader">{{ music.username }}</div>

    <div class="custom-player">
        <audio id="mainAudio" src="{{ music.music.url }}" preload="metadata"></audio>

        <div class="controls">
            <button class="play-pause-btn" id="playBtn" title="پخش / توقف">▶</button>
        </div>

        <div class="progress-container">
            <span id="currentTime">0:00</span>
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <span id="totalTime">0:00</span>
        </div>
    </div>

    <button class="share-btn" onclick="copyLink()">share 👾</button>
</div>

<script>
// --- Share Link Logic ---
function copyLink(){
    navigator.clipboard.writeText(window.location.href);
    const btn = document.querySelector('.share-btn');
    btn.innerText = 'کپی شد ✓';
    setTimeout(() => btn.innerText = 'share 👾', 1500);
}

// --- Player Logic ---
document.addEventListener("DOMContentLoaded", () => {
    const audio = document.getElementById('mainAudio');
    const playBtn = document.getElementById('playBtn');
    const progressFill = document.getElementById('progressFill');
    const progressBar = document.getElementById('progressBar');
    const currentTimeEl = document.getElementById('currentTime');
    const totalTimeEl = document.getElementById('totalTime');

    function formatTime(seconds) {
        if (isNaN(seconds)) return "0:00";
        let min = Math.floor(seconds / 60);
        let sec = Math.floor(seconds % 60);
        return `${min}:${sec < 10 ? '0' : ''}${sec}`;
    }

    function togglePlay() {
        if (audio.paused) {
            audio.play();
            playBtn.innerText = '⏸';
        } else {
            audio.pause();
            playBtn.innerText = '▶';
        }
    }

    playBtn.addEventListener('click', togglePlay);

    // Audio Events for Progress
    audio.addEventListener('loadedmetadata', () => {
        totalTimeEl.innerText = formatTime(audio.duration);
    });

    audio.addEventListener('timeupdate', () => {
        currentTimeEl.innerText = formatTime(audio.currentTime);
        let progressPercent = (audio.currentTime / audio.duration) * 100;
        progressFill.style.width = `${progressPercent}%`;
    });

    // Reset button icon when audio ends
    audio.addEventListener('ended', () => {
        playBtn.innerText = '▶';
        progressFill.style.width = '0%';
        audio.currentTime = 0;
    });

    // Progress Bar Click (Seek)
    progressBar.addEventListener('click', (e) => {
        let width = progressBar.clientWidth;
        let clickX = e.offsetX;
        let duration = audio.duration;
        audio.currentTime = (clickX / width) * duration;
    });
});
</script>

</body>
</html>
